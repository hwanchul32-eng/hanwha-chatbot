<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한화생명 보험 상담 챗봇</title>
<style>
:root {
  --primary: #FF6B00;
  --primary-dark: #E55A00;
  --primary-light: #FFF3E8;
  --gray-50: #F9FAFB;
  --gray-100: #F3F4F6;
  --gray-200: #E5E7EB;
  --gray-300: #D1D5DB;
  --gray-500: #6B7280;
  --gray-700: #374151;
  --gray-900: #111827;
  --white: #FFFFFF;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
  background: var(--gray-100);
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.app {
  width: 100%;
  max-width: 460px;
  height: 100dvh;
  max-height: 900px;
  background: var(--white);
  display: flex;
  flex-direction: column;
  box-shadow: 0 4px 40px rgba(0,0,0,0.12);
  position: relative;
}

@media (min-width: 500px) {
  .app { border-radius: 20px; height: 92dvh; }
}

/* Header */
.header {
  background: var(--primary);
  color: var(--white);
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.header-icon {
  width: 42px; height: 42px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.header-info h1 {
  font-size: 17px;
  font-weight: 700;
}

.header-info p {
  font-size: 12px;
  opacity: 0.85;
  margin-top: 2px;
}

.header-user {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.header-user-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.6);
  object-fit: cover;
  background: rgba(255,255,255,0.15);
}

.header-user-info {
  text-align: right;
}

.header-user-info .user-name {
  font-size: 13px;
  font-weight: 700;
  line-height: 1.3;
}

.header-user-info .user-label {
  font-size: 10px;
  opacity: 0.8;
  line-height: 1.3;
}

/* Mode Tabs */
.mode-tabs {
  display: flex;
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  flex-shrink: 0;
}

.mode-tab {
  flex: 1;
  padding: 11px 0;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--gray-500);
  cursor: pointer;
  border: none;
  background: none;
  position: relative;
  transition: color 0.25s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.mode-tab::after {
  content: '';
  position: absolute;
  bottom: 0; left: 20%; right: 20%;
  height: 2.5px;
  border-radius: 2px;
  background: transparent;
  transition: all 0.25s;
}

.mode-tab.active {
  color: var(--primary);
}

.mode-tab.active::after {
  background: var(--primary);
  left: 10%; right: 10%;
}

.mode-tab.staff.active {
  color: #2563EB;
}

.mode-tab.staff.active::after {
  background: #2563EB;
}

.mode-tab-icon {
  font-size: 15px;
}

/* Staff mode theme override */
.app.staff-mode .header {
  background: #1E40AF;
}

.app.staff-mode .msg-avatar {
  background: #2563EB;
}

.app.staff-mode .msg.user .msg-bubble {
  background: #2563EB;
}

.app.staff-mode .quick-btn {
  border-color: #2563EB;
  color: #2563EB;
}

.app.staff-mode .quick-btn:hover {
  background: #2563EB;
  color: var(--white);
}

.app.staff-mode .input-area button {
  background: #2563EB;
}

.app.staff-mode .input-area button:hover {
  background: #1E40AF;
}

.app.staff-mode .input-area input:focus {
  border-color: #2563EB;
}

.app.staff-mode .read-check.read svg {
  stroke: #60A5FA;
}

.app.staff-mode .msg.bot .read-check.read svg {
  stroke: #2563EB;
}

/* Chat Area */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}

.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 4px; }

/* Messages */
.msg {
  display: flex;
  gap: 8px;
  max-width: 88%;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--primary);
  color: var(--white);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 2px;
}

.msg.user .msg-avatar {
  background: var(--gray-700);
}

.msg-bubble {
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.6;
  word-break: keep-all;
}

.msg.bot .msg-bubble {
  background: var(--gray-100);
  color: var(--gray-900);
  border-top-left-radius: 4px;
}

.msg.user .msg-bubble {
  background: var(--primary);
  color: var(--white);
  border-top-right-radius: 4px;
}

/* Read receipt */
.msg-meta {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 5px;
  justify-content: flex-end;
}

.msg.bot .msg-meta {
  justify-content: flex-start;
}

.msg-time {
  font-size: 10px;
  color: var(--gray-400);
}

.msg.user .msg-time {
  color: rgba(255,255,255,0.6);
}

.read-check {
  display: inline-flex;
  align-items: center;
  gap: 0;
}

.read-check svg {
  width: 14px;
  height: 14px;
  stroke-width: 2.5;
  transition: all 0.3s ease;
}

.read-check.unread svg {
  stroke: rgba(255,255,255,0.4);
}

.read-check.read svg {
  stroke: #60D5FA;
}

.msg.bot .read-check.unread svg {
  stroke: var(--gray-300);
}

.msg.bot .read-check.read svg {
  stroke: var(--primary);
}

/* Quick Buttons */
.quick-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.quick-btn {
  background: var(--white);
  border: 1.5px solid var(--primary);
  color: var(--primary);
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 500;
}

.quick-btn:hover {
  background: var(--primary);
  color: var(--white);
}

/* Product Card */
.product-card {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: 12px;
  padding: 14px;
  margin-top: 8px;
  cursor: pointer;
  transition: all 0.2s;
}

.product-card:hover {
  border-color: var(--primary);
  box-shadow: 0 2px 8px rgba(255,107,0,0.12);
}

.product-card .pc-category {
  font-size: 11px;
  color: var(--primary);
  font-weight: 600;
  background: var(--primary-light);
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  margin-bottom: 6px;
}

.product-card .pc-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--gray-900);
  margin-bottom: 4px;
}

.product-card .pc-purpose {
  font-size: 12px;
  color: var(--gray-500);
  line-height: 1.5;
}

/* Detail */
.detail-section {
  margin-top: 8px;
}

.detail-section h4 {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  margin: 12px 0 6px 0;
  display: flex;
  align-items: center;
  gap: 4px;
}

.detail-section h4:first-child { margin-top: 4px; }

.detail-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  margin-top: 4px;
}

.detail-table th {
  background: var(--primary-light);
  color: var(--primary-dark);
  text-align: left;
  padding: 6px 8px;
  font-weight: 600;
}

.detail-table td {
  padding: 6px 8px;
  border-bottom: 1px solid var(--gray-100);
  color: var(--gray-700);
}

.detail-list {
  list-style: none;
  padding: 0;
}

.detail-list li {
  font-size: 12px;
  color: var(--gray-700);
  padding: 3px 0;
  padding-left: 14px;
  position: relative;
  line-height: 1.5;
}

.detail-list li::before {
  content: '•';
  color: var(--primary);
  position: absolute;
  left: 0;
  font-weight: bold;
}

.caution-list li::before {
  content: '!';
  color: #EF4444;
  font-size: 10px;
  font-weight: 800;
}

/* Scenario Card */
.scenario-card {
  background: linear-gradient(135deg, var(--primary-light), #FFF9F2);
  border: 1px solid #FFD4A8;
  border-radius: 12px;
  padding: 14px;
  margin-top: 8px;
  cursor: pointer;
  transition: all 0.2s;
}

.scenario-card:hover {
  box-shadow: 0 2px 8px rgba(255,107,0,0.15);
}

.scenario-card .sc-persona {
  font-size: 14px;
  font-weight: 700;
  color: var(--gray-900);
  margin-bottom: 4px;
}

.scenario-card .sc-concern {
  font-size: 12px;
  color: var(--gray-500);
  line-height: 1.5;
  font-style: italic;
}

/* Comparison Table */
.compare-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
  margin-top: 8px;
  border-radius: 8px;
  overflow: hidden;
}

.compare-table th {
  background: var(--primary);
  color: var(--white);
  padding: 8px 6px;
  font-weight: 600;
  text-align: center;
}

.compare-table th:first-child {
  text-align: left;
}

.compare-table td {
  padding: 7px 6px;
  border-bottom: 1px solid var(--gray-100);
  color: var(--gray-700);
  text-align: center;
  line-height: 1.4;
}

.compare-table td:first-child {
  text-align: left;
  font-weight: 600;
  color: var(--gray-900);
  background: var(--gray-50);
}

.compare-table tr:last-child td { border-bottom: none; }

/* FAQ Item */
.faq-item {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: 10px;
  padding: 10px 14px;
  margin-top: 6px;
  cursor: pointer;
  transition: all 0.2s;
}

.faq-item:hover {
  border-color: var(--primary);
}

.faq-item .faq-q {
  font-size: 13px;
  font-weight: 600;
  color: var(--gray-900);
}

/* Input Area */
.input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--gray-200);
  background: var(--white);
  flex-shrink: 0;
  display: flex;
  gap: 8px;
}

.input-area input {
  flex: 1;
  border: 1.5px solid var(--gray-200);
  border-radius: 24px;
  padding: 11px 18px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.input-area input:focus {
  border-color: var(--primary);
}

.input-area button {
  width: 44px; height: 44px;
  background: var(--primary);
  color: var(--white);
  border: none;
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
  flex-shrink: 0;
}

.input-area button:hover {
  background: var(--primary-dark);
}

.input-area button svg {
  width: 20px; height: 20px;
}

/* Typing indicator */
.typing {
  display: flex;
  gap: 4px;
  padding: 8px 0;
}

.typing span {
  width: 7px; height: 7px;
  background: var(--gray-300);
  border-radius: 50%;
  animation: bounce 1.4s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

/* Premium highlight */
.premium-highlight {
  color: var(--primary);
  font-weight: 700;
}

/* Back button inside chat */
.back-link {
  display: inline-block;
  margin-top: 8px;
  font-size: 12px;
  color: var(--primary);
  cursor: pointer;
  font-weight: 600;
}

.back-link:hover { text-decoration: underline; }
</style>
</head>

<div class="app">
  <div class="header">
    <div class="header-icon">H</div>
    <div class="header-info">
      <h1>한화생명 보험 상담</h1>
      <p>AI 챗봇이 맞춤 보험을 안내해드립니다</p>
    </div>
    <div class="header-user">
      <div class="header-user-info">
        <div class="user-name">김한화</div>
        <div class="user-label">프리미엄 고객</div>
      </div>
      <img class="header-user-avatar" src="https://api.dicebear.com/9.x/personas/svg?seed=hanwha" alt="사용자" onerror="this.style.display='none'">
    </div>
  </div>
  <div class="mode-tabs">
    <button class="mode-tab customer active" onclick="switchMode('customer')">
      <span class="mode-tab-icon">&#128172;</span> 고객 상담
    </button>
    <button class="mode-tab staff" onclick="switchMode('staff')">
      <span class="mode-tab-icon">&#128188;</span> 사내 업무
    </button>
  </div>
  <div class="chat-area" id="chatArea"></div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="궁금한 점을 물어보세요..." autocomplete="off">
    <button id="sendBtn" aria-label="전송">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
let DATA = null;
const chatArea = document.getElementById('chatArea');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

// ── Claude API 설정 ──
const API_KEY = 'YOUR_ANTHROPIC_API_KEY';
const API_URL = 'https://api.anthropic.com/v1/messages';
const MODEL = 'claude-sonnet-4-20250514';
let conversationHistory = [];

// ── 모드 관리 ──
let isSending = false;
let currentMode = 'customer';
const chatHistories = { customer: [], staff: [] };
const chatContents = { customer: '', staff: '' };

function switchMode(mode) {
  if (mode === currentMode || isSending) return;

  // 현재 모드 대화 저장
  chatHistories[currentMode] = [...conversationHistory];
  chatContents[currentMode] = chatArea.innerHTML;

  // 모드 전환
  currentMode = mode;
  conversationHistory = [...(chatHistories[mode] || [])];

  // 탭 UI
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.mode-tab.${mode}`).classList.add('active');

  // 테마 전환
  const app = document.querySelector('.app');
  const headerInfo = document.querySelector('.header-info');
  if (mode === 'staff') {
    app.classList.add('staff-mode');
    headerInfo.querySelector('h1').textContent = '사내 업무 어시스턴트';
    headerInfo.querySelector('p').textContent = '인수심사 · 청구절차 · 민원처리 규정 검색';
    userInput.placeholder = '사내 규정을 검색하세요...';
  } else {
    app.classList.remove('staff-mode');
    headerInfo.querySelector('h1').textContent = '한화생명 보험 상담';
    headerInfo.querySelector('p').textContent = 'AI 챗봇이 맞춤 보험을 안내해드립니다';
    userInput.placeholder = '궁금한 점을 물어보세요...';
  }

  // 저장된 대화 복원 or 웰컴
  if (chatContents[mode]) {
    chatArea.innerHTML = chatContents[mode];
  } else {
    chatArea.innerHTML = '';
    if (mode === 'customer') showWelcome();
    else showStaffWelcome();
  }
  scrollDown();
}

function buildSystemPrompt() {
  return `<role>
당신은 한화생명 다이렉트 보험 전문 AI 상담사입니다.
10년 경력의 보험설계사처럼 고객의 상황을 파악하고, 아래 제공된 상품 데이터를 근거로 정확하고 친절하게 안내합니다.
고객이 편안하게 대화할 수 있도록 자연스러운 구어체를 사용하되, 정보의 정확성은 절대 타협하지 않습니다.
</role>

<documents>
<document index="1">
<source>한화생명 다이렉트 보험상품 데이터 (2026년 4월 기준)</source>
<document_content>
${JSON.stringify(DATA, null, 0)}
</document_content>
</document>
</documents>

<instructions>
1. 데이터 그라운딩: 보험료, 보장금액, 가입조건 등 모든 숫자와 사실 정보는 반드시 위 document에 있는 값만 사용하세요. 데이터에 없는 수치는 절대 생성하지 마세요. 답변 전에 관련 데이터를 먼저 찾고, 해당 데이터를 근거로 답변하세요.

2. 모르는 것은 인정: 위 데이터에 없는 내용을 질문받으면 추측하지 말고 "정확한 안내를 위해 한화생명 고객센터 1588-6363으로 문의해주세요"라고 안내하세요. 이는 고객의 신뢰를 지키기 위해 매우 중요합니다.

3. 고객 맞춤 안내: 고객이 나이, 성별, 관심사, 예산 등을 알려주면 해당 조건에 맞는 상품과 보험료를 구체적으로 안내하세요. 조건이 부족하면 자연스럽게 질문해서 파악하세요.

4. 쉬운 설명: 보험 전문 용어(비갱신형, 해약환급금, 면책기간 등)는 처음 등장할 때 반드시 쉽게 풀어서 설명하세요. 고객은 보험에 대해 잘 모를 수 있습니다.

5. 두괄식 답변: 모든 답변은 핵심 결론이나 요약을 먼저 말하고, 그 뒤에 상세 설명을 이어가세요. 특히 비교 질문에서는 핵심 차이를 첫 문장에서 명확히 전달하세요.

6. 중립적 안내: 보험 가입을 강요하거나 과도하게 권유하지 마세요. 장점과 유의사항을 균형 있게 안내하여 고객이 스스로 판단할 수 있도록 하세요.

7. 후속 안내: 답변 끝에 고객이 이어서 물어볼 수 있는 관련 주제를 1~2개 자연스럽게 제안하세요. 대화가 끊기지 않도록 돕습니다.
</instructions>

<formatting>
답변은 순수 텍스트로 작성하세요. 마크다운 문법(**, ##, -, * 등)을 사용하지 마세요.

// ── UI Helpers ──
function getTime() {
  const now = new Date();
  return now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}

function checkSvg() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`;
}

function doubleCheckSvg() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M18 7l-8 8-3.5-3.5"/><path d="M22 7l-8 8-1-1"/></svg>`;
}

function addBot(html, extra) {
  // 이전 사용자 메시지의 읽음 표시를 '읽음'으로 변경
  markPreviousAsRead('user');

  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.innerHTML = `<div class="msg-avatar">H</div><div class="msg-bubble">${html}${extra || ''}<div class="msg-meta"><span class="msg-time">${getTime()}</span><span class="read-check unread">${checkSvg()}</span></div></div>`;
  chatArea.appendChild(wrap);

  // 봇 메시지는 사용자가 바로 본 것으로 처리
  setTimeout(() => markAsRead(wrap), 600);
  scrollDown();
}

function addUser(text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg user';
  wrap.innerHTML = `<div class="msg-avatar">U</div><div class="msg-bubble">${esc(text)}<div class="msg-meta"><span class="msg-time">${getTime()}</span><span class="read-check unread">${checkSvg()}</span></div></div>`;
  chatArea.appendChild(wrap);
  scrollDown();
}

function markAsRead(msgEl) {
  const check = msgEl.querySelector('.read-check');
  if (check && check.classList.contains('unread')) {
    check.classList.remove('unread');
    check.classList.add('read');
    check.innerHTML = doubleCheckSvg();
  }
}

function markPreviousAsRead(type) {
  const msgs = chatArea.querySelectorAll(`.msg.${type}`);
  msgs.forEach(m => markAsRead(m));
}

function showTyping() {
  const el = document.createElement('div');
  el.className = 'msg bot';
  el.id = 'typing';
  el.innerHTML = `<div class="msg-avatar">H</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatArea.appendChild(el);
  scrollDown();
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function scrollDown() {
  requestAnimationFrame(() => { chatArea.scrollTop = chatArea.scrollHeight; });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function formatMoney(n) {
  if (n >= 10000) return (n / 10000).toFixed(n % 10000 === 0 ? 0 : 1) + '만';
  return n.toLocaleString();
}

sendBtn.addEventListener('click', send);
userInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.isComposing) send(); });

function send() {
  const text = userInput.value.trim();
  if (!text || !DATA || isSending) return;

function handleQuick(text) {

async function callClaude(userText) {
  isSending = true;
  sendBtn.disabled = true;
  userInput.disabled = true;

  conversationHistory.push({ role: 'user', content: userText });

  // 대화 히스토리가 너무 길어지면 최근 20개만 유지
  if (conversationHistory.length > 20) {
    conversationHistory = conversationHistory.slice(-20);
  }

  showTyping();

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 1024,
        system: currentMode === 'staff' ? buildStaffSystemPrompt() : buildSystemPrompt(),
        messages: conversationHistory,
        stream: true
      })
    });

    hideTyping();

    if (!res.ok) {
      const err = await res.text();
      addBot('죄송합니다, 일시적인 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
      console.error('API Error:', res.status, err);
      conversationHistory.pop();
      isSending = false;
      sendBtn.disabled = false;
      userInput.disabled = false;
      return;
    }

    // 스트리밍 응답 처리
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let buffer = '';

    // 봇 메시지 버블 미리 생성
    markPreviousAsRead('user');
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    wrap.innerHTML = `<div class="msg-avatar">H</div><div class="msg-bubble"><span class="stream-text"></span><div class="msg-meta"><span class="msg-time">${getTime()}</span><span class="read-check unread">${checkSvg()}</span></div></div>`;
    chatArea.appendChild(wrap);
    const streamEl = wrap.querySelector('.stream-text');
    scrollDown();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') continue;

        try {
          const parsed = JSON.parse(data);
          if (parsed.type === 'content_block_delta' && parsed.delta?.text) {
            fullText += parsed.delta.text;
            streamEl.innerHTML = formatResponse(fullText);
            scrollDown();
          }
        } catch (e) { /* skip */ }
      }
    }

    // 스트리밍 완료
    streamEl.innerHTML = formatResponse(fullText);
    setTimeout(() => markAsRead(wrap), 600);
    scrollDown();

    conversationHistory.push({ role: 'assistant', content: fullText });

  } catch (err) {
    hideTyping();
    addBot('네트워크 연결을 확인해주세요. 오류: ' + err.message);
    console.error(err);
    conversationHistory.pop();
  }

  isSending = false;
  sendBtn.disabled = false;
  userInput.disabled = false;
  userInput.focus();
}

function formatResponse(text) {
  // 줄바꿈을 <br>로 변환
  return text
    .replace(/&/g, '&amp;')

  "faq": [
    { "question": "비갱신형과 갱신형의 차이가 뭔가요?", "answer": "비갱신형은 가입 시 정해진 보험료가 만기까지 동일합니다. 갱신형은 1~5년마다 보험료가 재산정되어 나이가 들수록 오를 수 있습니다. 장기 유지할 경우 비갱신형이 총 납입보험료가 적을 수 있으나, 초기 보험료는 갱신형이 더 저렴합니다." },
    { "question": "해약환급금 미지급형이 뭔가요?", "answer": "납입기간 중 해지하면 환급금이 0원인 대신, 보험료가 표준형보다 약 14~31% 저렴한 상품입니다. 만기까지 유지할 계획이라면 합리적입니다. 납입 완료 후 해지 시에는 표준형의 약 50% 수준 환급금이 있습니다." },
    { "question": "보험료 납입이 어려워지면 어떻게 하나요?", "answer": "방법이 여러 가지 있습니다. ① 납입유예: 최대 6개월 보험료 납입 연기 (보장 유지) ② 감액완납: 보험금을 줄이고 잔여 보험료 납입 면제 ③ 자동대출납입: 해약환급금 한도 내에서 대출로 보험료 충당. 고객센터 1588-6363에서 상담하세요." },
    { "question": "보험금 청구는 어떻게 하나요?", "answer": "가장 간편한 방법은 한화생명 앱에서 청구하는 것입니다. 진단서·영수증을 촬영해서 업로드하면 됩니다. 접수 후 3영업일 이내 지급이 원칙이며, 사고조사가 필요한 경우 최대 30일까지 소요될 수 있습니다. 방문·우편 접수도 가능합니다." },
    { "question": "암보험의 90일 면책기간이란?", "answer": "암보험은 계약일로부터 90일간 보장되지 않습니다. 91일째부터 암 진단 시 보험금이 지급됩니다. 가입 직전 암을 알고 가입하는 역선택을 방지하기 위한 제도이며, 모든 보험사 공통 규정입니다." },
    { "question": "2년 감액기간이 뭔가요?", "answer": "가입 후 2년 이내에 보험금 지급 사유가 발생하면, 2년 이후 기준 보험금의 50%만 지급하는 것입니다. 예를 들어 암 진단금이 1,000만원인 상품에서, 가입 1년 후 암 진단 시 500만원만 지급됩니다. 2년이 경과하면 전액 지급." },
    { "question": "건강체 할인 조건이 뭔가요?", "answer": "상품마다 다르지만 일반적으로: ① 비흡연 (최근 1년, 소변검사 확인) ② 정상혈압 (수축기 140 미만, 이완기 90 미만) ③ 적정BMI (18.5~25.0). 세 가지 모두 충족 시 최대 15~20% 할인. 고혈압·당뇨 투약 중이면 할인 불가." },
    { "question": "종신보험과 정기보험 중 뭐가 좋아요?", "answer": "목적이 다릅니다. 정기보험은 '정해진 기간' 보장이라 보험료가 저렴하고, 종신보험은 '평생' 보장이라 보험료가 비쌉니다. 자녀 성장기나 대출 상환기간만 보장하면 되면 정기보험, 상속이나 평생 사망보장이 필요하면 종신보험이 적합합니다." },
    { "question": "연금보험의 비과세 조건이 뭔가요?", "answer": "저축보험 기준: 월 150만원 이하 납입 + 5년 이상 납입 + 10년 이상 유지 시 이자소득세 15.4%가 면제됩니다. 연금저축보험은 비과세 대신 세액공제를 받고, 연금 수령 시 연금소득세(3.3~5.5%)가 부과됩니다." },
    { "question": "보험을 여러 개 가입하면 중복 보장이 되나요?", "answer": "정액형 보험(암 진단금, 사망보험금 등)은 여러 개 가입해도 각각 전액 지급됩니다. 다만 실손의료비보험은 실제 치료비 기준이므로 중복 가입해도 초과 수령이 불가합니다." },
    { "question": "실손보험은 왜 갱신형밖에 없어요?", "answer": "실손보험은 실제 의료비를 보장하는 구조라, 의료비 물가 변동을 반영하기 위해 갱신형으로만 운영됩니다. 이는 금융감독원 규정에 따른 것이며, 모든 보험사 공통입니다." },
    { "question": "e암보험이랑 e건강보험 둘 다 가입해야 하나요?", "answer": "예산이 허용하면 둘 다 가입하는 것이 좋습니다. e암보험은 암만 집중 보장(진단금이 높음), e건강보험은 암+뇌+심장을 통합 보장합니다. 예산이 빠듯하면 e건강보험(암뇌심) 하나로 3대 질병을 모두 커버하는 것이 효율적입니다." },
    { "question": "고혈압이 있는데 보험 가입이 되나요?", "answer": "가능하지만 조건이 붙을 수 있습니다. 고혈압 투약 중이면: ① 건강고객 할인 불가 ② 일부 상품 할증(보험료 추가) 가능 ③ 혈압 수치에 따라 인수 거절도 가능. 정확한 심사 결과는 가입 신청 후 확인됩니다." },
